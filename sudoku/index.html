<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>数独</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1814;--bg2:#201e1a;--surface:#252219;--surface2:#2c2820;--border:#3a3530;--border2:#4a4540;--accent:#d4a84b;--accent2:#f0c870;--text:#e8dcc8;--text2:#a89878;--text3:#6a5a48;--red:#ff5252;--green:#4ade80;--blue:#60b8ff;--purple:#b06aff;--sel-bg:#f5e6b0;--sel-border:#d4a84b;--sel-text:#2a1800;--rel-bg:#2e2820;--same-bg:#4a3608;--same-ring:#8a6010;--conf-bg:rgba(255,60,60,0.20);--multi-bg:rgba(184,122,255,0.22);--multi-ring:#b87aff;--cell-inner:#3c3426;--cell-size:65px;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(212,168,75,0.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(96,184,255,0.03) 0%,transparent 60%);pointer-events:none;z-index:0;}
.main-container{display:flex;gap:32px;padding:28px 20px;position:relative;z-index:10;max-width:1200px;width:100%;align-items:stretch;justify-content:center;flex-wrap:wrap;}
.controls-panel{width:244px;display:flex;flex-direction:column;gap:14px;}
.controls-panel .panel-section{flex:1;}
.panel-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;}
.panel-label{font-size:13px;letter-spacing:1px;color:var(--text2);font-weight:600;margin-bottom:12px;}
.mode-tabs{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:3px;}
.mode-tab{flex:1;padding:9px 4px;border:none;border-radius:6px;background:transparent;color:var(--text2);font-family:'Noto Sans SC',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;font-weight:500;}
.mode-tab.active{background:var(--accent);color:#1a1408;font-weight:700;}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1;}
.diff-btn{height:40px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text2);font-family:"Noto Sans SC",sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-weight:500;}
.diff-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(212,168,75,0.08);}
.diff-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.action-btn{flex:1;width:100%;height:40px;padding:0 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:"Noto Sans SC",sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;transition:all 0.2s;font-weight:500;margin-bottom:6px;}
.action-btn:last-child{margin-bottom:0;}
.action-btn.primary{background:var(--accent);color:#1a1408;border-color:var(--accent);font-weight:700;justify-content:center;}
.action-btn.blue-btn{border-color:rgba(96,184,255,0.4);color:var(--blue);}
.action-btn.purple-btn{border-color:rgba(176,106,255,0.4);color:var(--purple);}
.action-btn:hover{filter:brightness(1.15);}
.footer-counter{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);}
.hint-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text2);font-family:"JetBrains Mono",monospace;font-size:12px;cursor:pointer;padding:2px 8px;transition:all 0.15s;}
.hint-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.hint-btn:disabled{opacity:0.35;cursor:default;}
/* Num column */
.num-column{display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:space-between;padding:4px 0;}
.num-col-btn{width:46px;height:46px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.num-col-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(212,168,75,0.08);}
.num-col-btn.digit-active{background:var(--accent);color:#1a1408;border-color:var(--accent);box-shadow:0 0 12px rgba(212,168,75,0.3);}
.num-col-btn.notes-col-btn{font-size:16px;color:var(--blue);border-color:rgba(96,184,255,0.4);margin-top:4px;}
.num-col-btn.notes-col-btn:hover{background:rgba(96,184,255,0.12);border-color:var(--blue);}
.num-col-btn.notes-col-btn.active{background:rgba(96,184,255,0.18);border-color:var(--blue);box-shadow:0 0 12px rgba(96,184,255,0.25);}
.num-col-btn.erase-col-btn{font-size:18px;color:var(--text2);border-color:rgba(255,82,82,0.35);}
.num-col-btn.erase-col-btn:hover{background:rgba(255,82,82,0.1);border-color:var(--red);color:var(--red);}
.num-col-btn.bivalue-btn{color:var(--green);border-color:rgba(74,222,128,0.4);margin-top:4px;}
.num-col-btn.bivalue-btn:hover{background:rgba(74,222,128,0.1);border-color:var(--green);}
.num-col-btn.bivalue-btn.active{background:rgba(74,222,128,0.15);border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,0.2);}
.num-col-btn.colormark-btn{color:var(--purple);border-color:rgba(176,106,255,0.4);}
.num-col-btn.colormark-btn:hover{background:rgba(176,106,255,0.1);border-color:var(--purple);}
.num-col-btn.colormark-btn.active{background:rgba(176,106,255,0.15);border-color:var(--purple);box-shadow:0 0 12px rgba(176,106,255,0.2);}
.num-col-btn.completed{opacity:0.2;pointer-events:none;cursor:default;}
/* Board */
.board-container{display:flex;flex-direction:column;align-items:center;gap:0;}
.board-wrapper{position:relative;flex-shrink:0;}
.board-wrapper.notes-active #sudoku-board{border-color:var(--blue);box-shadow:0 0 0 1px rgba(96,184,255,0.2),0 0 0 3px rgba(96,184,255,0.12),0 0 32px rgba(96,184,255,0.35),0 0 64px rgba(96,184,255,0.15),0 8px 32px rgba(0,0,0,0.5);transition:border-color 0.2s,box-shadow 0.2s;}
.board-footer{flex-shrink:0;margin-top:14px;display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text2);}
.footer-sep{color:var(--text3);}
.puzzle-rating{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:0.5px;}
.timer-display{font-size:22px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.history-block{flex:1;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-top:14px;display:flex;align-items:center;justify-content:center;padding:0 20px;}
.hb-row{display:flex;align-items:center;justify-content:space-around;gap:8px;width:100%;}
.hb-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.hb-label{font-size:11px;color:var(--text3);letter-spacing:0.5px;white-space:nowrap;}
.hb-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);}
.hb-value.blue{color:var(--blue);}
.hb-divider{width:1px;height:40px;background:var(--border);flex-shrink:0;}
#sudoku-board{display:grid;grid-template-columns:repeat(9,var(--cell-size));grid-template-rows:repeat(9,var(--cell-size));border:3px solid var(--accent);border-radius:5px;overflow:hidden;box-shadow:0 0 0 1px rgba(212,168,75,0.12),0 0 50px rgba(212,168,75,0.12),0 8px 32px rgba(0,0,0,0.5);position:relative;user-select:none;transition:border-color 0.2s,box-shadow 0.2s;}
.cell{width:var(--cell-size);height:var(--cell-size);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;cursor:pointer;position:relative;background:var(--bg2);border-right:1px solid var(--cell-inner);border-bottom:1px solid var(--cell-inner);transition:background 0.08s;color:var(--text);}
.cell[data-col="2"],.cell[data-col="5"]{border-right:3px solid rgba(212,168,75,0.85);}
.cell[data-row="2"],.cell[data-row="5"]{border-bottom:3px solid rgba(212,168,75,0.85);}
.cell.hl-related{background:var(--rel-bg);}
.cell.hl-same{background:var(--same-bg);box-shadow:inset 0 0 0 2px var(--same-ring);}
.cell.hl-conflict{background:var(--conf-bg);}
.cell.hl-selected{background:var(--sel-bg)!important;box-shadow:inset 0 0 0 3px var(--sel-border)!important;z-index:2;}
.cell.hl-selected{color:var(--sel-text)!important;}
.cell.hl-selected.given{color:#5c3d00!important;}
.cell.hl-selected.user-ok{color:#003d80!important;}
.cell.hl-selected.hint-cell{color:#1a4d00!important;}
.cell.hl-selected.num-conflict,.cell.hl-selected.user-err{color:#8b0000!important;text-shadow:none!important;}
.cell.hl-selected .note-num.on{color:#1e4a8a!important;}
.cell.hl-selected .note-num.conflict-note{color:#990000!important;}
.cell.hl-selected .cage-sum{color:#7a4a00!important;text-shadow:none;}
.cell.hl-bivalue{box-shadow:inset 0 0 0 2px var(--green)!important;}
.cell.given{color:var(--accent2);}
.cell.user-ok{color:#a8d8ff;}
.cell.user-err{color:var(--red)!important;text-shadow:0 0 14px rgba(255,82,82,0.5);}
.cell.hint-cell{color:#a0f0cc;}
.cell.num-conflict{color:var(--red)!important;text-shadow:0 0 14px rgba(255,82,82,0.5);}
.notes-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:100%;height:100%;position:absolute;top:0;left:0;}
.note-num{display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'JetBrains Mono',monospace;color:transparent;font-weight:600;line-height:1;border-radius:3px;transition:background 0.1s,color 0.1s;}
.note-num.on{color:#88b8e8;}
.note-num.conflict-note{color:var(--red);text-shadow:0 0 5px rgba(255,82,82,0.7);}
.note-num.on.hl-match{color:#1a1408;background:var(--accent2);font-weight:800;text-shadow:none;}
/* Killer cell: notes grid sits below cage-sum strip */
/* Strip height = 15px from top of cell, notes occupy remaining square area */
.killer-cell .notes-grid{top:14px;left:50%;transform:translateX(-50%);width:50px;height:50px;}
.cage-sum{position:absolute;top:3px;left:4px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:800;color:#f0c870;line-height:1.1;pointer-events:none;z-index:5;}
#cage-overlay{position:absolute;top:3px;left:3px;width:calc(100% - 6px);height:calc(100% - 6px);pointer-events:none;z-index:4;}
#multi-overlay{position:absolute;top:3px;left:3px;width:calc(100% - 6px);height:calc(100% - 6px);pointer-events:none;z-index:6;overflow:visible;}
.overlay{position:fixed;inset:0;background:rgba(10,9,8,0.85);z-index:100;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.show{opacity:1;pointer-events:all;}
.overlay-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;text-align:center;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.overlay-icon{font-size:48px;margin-bottom:12px;}
.overlay-title{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--accent);letter-spacing:3px;margin-bottom:10px;}
.overlay-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes hint-flash{0%,100%{filter:brightness(1)}50%{filter:brightness(1.6)}}
.anim-shake{animation:shake 0.35s ease-in-out;}
.anim-hint{animation:hint-flash 0.45s ease-in-out;}
</style>
</head>
<body>
<div class="main-container">
  <div class="controls-panel">
    <div class="panel-section" style="flex:0 0 auto">
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode('normal')">普通数独</button>
        <button class="mode-tab" onclick="setMode('killer')">杀手数独</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">难度选择</div>
      <div class="diff-grid">
        <button class="diff-btn active" data-diff="beginner" onclick="setDiff('beginner')">入门</button>
        <button class="diff-btn" data-diff="easy" onclick="setDiff('easy')">简单</button>
        <button class="diff-btn" data-diff="medium" onclick="setDiff('medium')">中等</button>
        <button class="diff-btn" data-diff="hard" onclick="setDiff('hard')">困难</button>
        <button class="diff-btn" data-diff="expert" onclick="setDiff('expert')">专家</button>
        <button class="diff-btn" data-diff="master" onclick="setDiff('master')">大师</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">操作</div>
      <button class="action-btn primary" onclick="newGame()">新游戏</button>
      <button class="action-btn blue-btn" onclick="giveHint()">智能填充</button>
      <button class="action-btn purple-btn" onclick="fillAllCandidates()">自动填入候选数</button>
      <button class="action-btn" onclick="resetBoard()">重置</button>
    </div>
  </div>

  <div style="display:flex;gap:10px;align-items:stretch;flex:0 0 auto">
    <div class="board-container">
      <div class="board-wrapper">
        <div id="sudoku-board"></div>
        <svg id="cage-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
        <svg id="multi-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="board-footer">
        <span class="puzzle-rating" id="puzzle-rating" title="谜题难度评分"></span>
        <span class="footer-sep" id="rating-sep" style="display:none">·</span>
        <span class="timer-display" id="timer">00:00</span>
        <span class="footer-sep">·</span>
        <span class="footer-counter" id="life-display">错误 0/3</span>
        <span class="footer-sep">·</span>
        <button class="hint-btn" id="cell-hint-btn" onclick="useCellHint()">提示 <span id="cell-hint-left">0/3</span></button>
        <span id="notes-label" style="color:var(--blue);opacity:0;transition:opacity 0.2s;margin-left:4px">● 候选数</span>
      </div>
      <div class="history-block">
        <div class="hb-row">
          <div class="hb-item"><span class="hb-label">本局得分</span><span class="hb-value" id="cur-score">0</span></div>
          <div class="hb-divider"></div>
          <div class="hb-item"><span class="hb-label">历史最高分</span><span class="hb-value" id="best-score">—</span></div>
          <div class="hb-divider"></div>
          <div class="hb-item"><span class="hb-label">最短用时</span><span class="hb-value blue" id="best-time">—</span></div>
        </div>
      </div>
    </div>

    <div class="num-column" id="num-column">
      <button class="num-col-btn" id="nc-1" onclick="numColClick(1)">1</button>
      <button class="num-col-btn" id="nc-2" onclick="numColClick(2)">2</button>
      <button class="num-col-btn" id="nc-3" onclick="numColClick(3)">3</button>
      <button class="num-col-btn" id="nc-4" onclick="numColClick(4)">4</button>
      <button class="num-col-btn" id="nc-5" onclick="numColClick(5)">5</button>
      <button class="num-col-btn" id="nc-6" onclick="numColClick(6)">6</button>
      <button class="num-col-btn" id="nc-7" onclick="numColClick(7)">7</button>
      <button class="num-col-btn" id="nc-8" onclick="numColClick(8)">8</button>
      <button class="num-col-btn" id="nc-9" onclick="numColClick(9)">9</button>
      <button class="num-col-btn erase-col-btn" id="nc-0" onclick="numColClick(0)">✕</button>
      <button class="num-col-btn notes-col-btn" id="nc-notes" onclick="toggleNotes()">✎</button>
      <button class="num-col-btn bivalue-btn" id="nc-bivalue" onclick="toggleBivalue()" title="高亮已标注两个候选数的格子">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="1" y="1" width="26" height="26" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/><text x="5" y="12" font-family="JetBrains Mono,monospace" font-size="9" font-weight="700" fill="currentColor">1</text><text x="17" y="26" font-family="JetBrains Mono,monospace" font-size="9" font-weight="700" fill="currentColor">9</text></svg>
      </button>
      <button class="num-col-btn colormark-btn" id="nc-color" onclick="toggleColorMark()" title="候选数颜色标记">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="1" y="1" width="26" height="26" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="3" y="3" width="9" height="9" rx="2" fill="currentColor" opacity="0.9"/><text x="5" y="11" font-family="JetBrains Mono,monospace" font-size="8" font-weight="900" fill="#1a1408">1</text><text x="16" y="11" font-family="JetBrains Mono,monospace" font-size="8" font-weight="700" fill="currentColor">2</text><text x="16" y="24" font-family="JetBrains Mono,monospace" font-size="8" font-weight="700" fill="currentColor">3</text></svg>
      </button>
    </div>
  </div>
</div>

<!-- Color palette strip -->
<div id="color-strip" style="display:none;position:fixed;z-index:500;background:#2c2820;border:1px solid #3a3530;border-radius:8px;padding:6px;box-shadow:0 4px 16px rgba(0,0,0,0.5);">
  <div id="cs-swatches" style="display:flex;flex-wrap:wrap;gap:4px;width:108px;margin-bottom:4px;"></div>
  <label style="display:block;position:relative;width:100%;height:22px;border-radius:4px;overflow:hidden;cursor:pointer;">
    <input type="color" id="cs-custom" value="#ff6b6b" style="position:absolute;width:140%;height:140%;top:-20%;left:-20%;border:none;cursor:pointer;opacity:0;">
    <div id="cs-custom-preview" style="width:100%;height:100%;border-radius:4px;border:1px solid #3a3530;display:flex;align-items:center;justify-content:center;font-size:9px;color:#6a5a48;font-family:'Noto Sans SC',sans-serif;background:#ff6b6b;">自定义</div>
  </label>
</div>

<div class="overlay" id="win-overlay">
  <div class="overlay-card">
    <div class="overlay-icon">🏆</div>
    <div class="overlay-title">COMPLETE</div>
    <div class="overlay-sub" id="win-message">恭喜完成！</div>
    <button class="action-btn primary" style="margin-top:8px" onclick="closeOverlay();newGame()"><span class="btn-icon">⊕</span>再来一局</button>
    <button class="action-btn" style="margin-top:4px" onclick="closeOverlay()">返回</button>
  </div>
</div>
<div class="overlay" id="lose-overlay">
  <div class="overlay-card">
    <div class="overlay-icon">💀</div>
    <div class="overlay-title" style="color:#ff5252">FAILED</div>
    <div class="overlay-sub">错误次数已达三次，挑战失败</div>
    <button class="action-btn primary" style="margin-top:8px;background:#ff5252;border-color:#ff5252" onclick="closeOverlay();newGame()"><span class="btn-icon">⊕</span>再来一局</button>
    <button class="action-btn" style="margin-top:4px" onclick="closeOverlay();revealBoard()">查看答案</button>
  </div>
</div>

<script>
/* STATE — all declared before any function that uses them */
let gameMode='normal', difficulty='beginner', notesMode=false;
let solution=[], puzzle=[], userBoard=[], notesBoard=[];
let cages=[], cellCageMap={};
let selectedCell=null, multiSelected=new Set(), isDragging=false, ctrlHeld=false;
let errorCount=0, hintCount=0, secondsElapsed=0, timerInterval=null, gameWon=false;
let givenCells=new Set(), hintCells=new Set();
let longPressTimer=null, longPressOrigin=null;
const LONG_PRESS_MS=120;
let activeColNum=0, bivalueMode=false, colorMarkMode=false;
let cellHintsLeft=3;
let undoStack=[];
let currentMarkColor='#ff6b6b';
let noteColors=Array.from({length:9},()=>Array.from({length:9},()=>({})));
const CS=65;
const DIFF_WEIGHT={beginner:0.6,easy:1,medium:1.8,hard:2.8,expert:4,master:5.5};

/* SCORING */
// Score = baseScore × timeFactor × errorFactor × hintFactor
// baseScore scales with difficulty; factors are multiplicative penalties
// Best time reference per difficulty (seconds): beginner=120,easy=200,medium=350,hard=500,expert=700,master=900
const DIFF_BEST_TIME={beginner:120,easy:200,medium:350,hard:500,expert:700,master:900};
function calcScore(secs,errors,hints,diff,mode){
  const base={beginner:800,easy:1500,medium:3000,hard:5000,expert:7500,master:10000}[diff]||1500;
  const mw=MODE_WEIGHT[mode]||1;
  const bestT=DIFF_BEST_TIME[diff]||300;
  const timeFactor=Math.max(0.3, 1-Math.min(0.7,(secs-bestT)/Math.max(1,bestT*2)));
  const errorFactor=Math.max(0, 1-errors*0.15);
  const hintFactor=Math.max(0, 1-hints*0.10);
  return Math.round(base*mw*timeFactor*errorFactor*hintFactor);
}
function fmtTime(s){return String(~~(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function loadHistory(){try{return JSON.parse(localStorage.getItem('sudoku_history')||'{}');}catch(e){return {};}}
function saveHistory(h){try{localStorage.setItem('sudoku_history',JSON.stringify(h));}catch(e){}}
function refreshHistory(){const h=loadHistory();document.getElementById('best-score').textContent=h.bestScore>0?h.bestScore:'—';document.getElementById('best-time').textContent=h.bestTime!=null?fmtTime(h.bestTime):'—';}
function recordWin(score){const h=loadHistory();if(score>(h.bestScore||0))h.bestScore=score;if(h.bestTime==null||secondsElapsed<h.bestTime)h.bestTime=secondsElapsed;saveHistory(h);refreshHistory();}
function updateStats(){document.getElementById('cur-score').textContent=calcScore(secondsElapsed,errorCount,hintCount,difficulty,gameMode);}
function updateHearts(){
  const el=document.getElementById('life-display');
  if(el)el.textContent=`错误 ${errorCount}/3`;
}
function updateNumColUI(){const counts={};for(let r=0;r<9;r++)for(let c=0;c<9;c++){const v=userBoard[r][c];if(v>0)counts[v]=(counts[v]||0)+1;}for(let i=1;i<=9;i++){const btn=document.getElementById(`nc-${i}`);if(!btn)continue;const done=counts[i]===9;btn.classList.toggle('digit-active',i===activeColNum&&!done);btn.classList.toggle('completed',done);}}

/* TIMER */
function startTimer(){secondsElapsed=0;timerInterval=setInterval(()=>{secondsElapsed++;document.getElementById('timer').textContent=fmtTime(secondsElapsed);updateStats();},1000);}
function stopTimer(){clearInterval(timerInterval);}
function resetTimer(){stopTimer();document.getElementById('timer').textContent='00:00';}
document.addEventListener('visibilitychange',()=>{if(gameWon)return;if(document.hidden){stopTimer();}else{timerInterval=setInterval(()=>{secondsElapsed++;document.getElementById('timer').textContent=fmtTime(secondsElapsed);updateStats();},1000);}});

/* ENGINE */
function generateSolution(){const b=Array.from({length:9},()=>Array(9).fill(0));fillBoard(b);return b;}
function fillBoard(b){const e=findEmpty(b);if(!e)return true;const[r,c]=e;for(const n of shuffle([1,2,3,4,5,6,7,8,9]))if(isValid(b,r,c,n)){b[r][c]=n;if(fillBoard(b))return true;b[r][c]=0;}return false;}
function findEmpty(b){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(!b[r][c])return[r,c];return null;}
function isValid(b,row,col,num){for(let i=0;i<9;i++){if(b[row][i]===num||b[i][col]===num)return false;}const br=~~(row/3)*3,bc=~~(col/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)if(b[br+dr][bc+dc]===num)return false;return true;}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getCandidates(b,r,c){if(b[r][c])return new Set();const used=new Set();for(let i=0;i<9;i++){if(b[r][i])used.add(b[r][i]);if(b[i][c])used.add(b[i][c]);}const br=~~(r/3)*3,bc=~~(c/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)if(b[br+dr][bc+dc])used.add(b[br+dr][bc+dc]);const s=new Set();for(let n=1;n<=9;n++)if(!used.has(n))s.add(n);return s;}
function cellIsConflict(b,r,c){const v=b[r][c];if(!v)return false;for(let i=0;i<9;i++){if(i!==c&&b[r][i]===v)return true;if(i!==r&&b[i][c]===v)return true;}const br=~~(r/3)*3,bc=~~(c/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++){const nr=br+dr,nc=bc+dc;if((nr!==r||nc!==c)&&b[nr][nc]===v)return true;}return false;}
function noteConflictsPlaced(b,r,c,n){for(let i=0;i<9;i++){if(b[r][i]===n||b[i][c]===n)return true;}const br=~~(r/3)*3,bc=~~(c/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)if(b[br+dr][bc+dc]===n)return true;return false;}

/* LOGIC SOLVER */
function logicSolveLevel(puzzle,level){
  const board=puzzle.map(r=>[...r]);
  const cands=Array.from({length:9},(_,r)=>Array.from({length:9},(_,c)=>{if(board[r][c]!==0)return new Set();const used=new Set();for(let i=0;i<9;i++){if(board[r][i])used.add(board[r][i]);if(board[i][c])used.add(board[i][c]);}const br=~~(r/3)*3,bc=~~(c/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)if(board[br+dr][bc+dc])used.add(board[br+dr][bc+dc]);const s=new Set();for(let n=1;n<=9;n++)if(!used.has(n))s.add(n);return s;}));
  function place(r,c,n){board[r][c]=n;cands[r][c]=new Set();for(let i=0;i<9;i++){cands[r][i].delete(n);cands[i][c].delete(n);}const br=~~(r/3)*3,bc=~~(c/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)cands[br+dr][bc+dc].delete(n);}
  const rows=[],cols=[],boxes=[];
  for(let i=0;i<9;i++){const row=[],col=[],box=[];for(let j=0;j<9;j++){row.push([i,j]);col.push([j,i]);box.push([~~(i/3)*3+~~(j/3),(i%3)*3+(j%3)]);}rows.push(row);cols.push(col);boxes.push(box);}
  const units=[...rows,...cols,...boxes];
  function nakedSubset(sz){let f=false;for(const unit of units){const em=unit.filter(([r,c])=>board[r][c]===0&&cands[r][c].size>0&&cands[r][c].size<=sz);function cb(start,ch){if(ch.length===sz){const u=new Set();ch.forEach(([r,c])=>cands[r][c].forEach(n=>u.add(n)));if(u.size!==sz)return;for(const[r,c]of unit){if(ch.some(([r2,c2])=>r2===r&&c2===c))continue;if(board[r][c]!==0)continue;const b4=cands[r][c].size;u.forEach(n=>cands[r][c].delete(n));if(cands[r][c].size<b4)f=true;}return;}for(let i=start;i<em.length;i++)cb(i+1,[...ch,em[i]]);}cb(0,[]);}return f;}
  function hiddenSubset(sz){let f=false;for(const unit of units){const em=unit.filter(([r,c])=>board[r][c]===0);const dc={};for(let n=1;n<=9;n++){if(unit.some(([r,c])=>board[r][c]===n))continue;const cs=em.filter(([r,c])=>cands[r][c].has(n));if(cs.length>=2&&cs.length<=sz)dc[n]=cs;}const digs=Object.keys(dc).map(Number);function cb(start,ch){if(ch.length===sz){const cm=new Map();ch.forEach(n=>dc[n].forEach(([r,c])=>{const k=`${r},${c}`;if(!cm.has(k))cm.set(k,[r,c]);}));if(cm.size!==sz)return;cm.forEach(([r,c])=>{const b4=cands[r][c].size;for(let n=1;n<=9;n++)if(!ch.includes(n))cands[r][c].delete(n);if(cands[r][c].size<b4)f=true;});return;}for(let i=start;i<digs.length;i++)cb(i+1,[...ch,digs[i]]);}cb(0,[]);}return f;}
  function locked(){let f=false;for(const box of boxes){for(let n=1;n<=9;n++){if(box.some(([r,c])=>board[r][c]===n))continue;const pl=box.filter(([r,c])=>board[r][c]===0&&cands[r][c].has(n));if(pl.length<2)continue;const rs=new Set(pl.map(([r])=>r)),cs=new Set(pl.map(([,c])=>c));const br2=~~(pl[0][0]/3)*3,bc2=~~(pl[0][1]/3)*3;if(rs.size===1){const row=[...rs][0];for(let c=0;c<9;c++){if(~~(c/3)===~~(bc2/3))continue;if(board[row][c]===0&&cands[row][c].has(n)){cands[row][c].delete(n);f=true;}}}if(cs.size===1){const col=[...cs][0];for(let r=0;r<9;r++){if(~~(r/3)===~~(br2/3))continue;if(board[r][col]===0&&cands[r][col].has(n)){cands[r][col].delete(n);f=true;}}}}}for(let row=0;row<9;row++){for(let n=1;n<=9;n++){const ps=[];for(let c=0;c<9;c++)if(board[row][c]===0&&cands[row][c].has(n))ps.push([row,c]);if(ps.length<2)continue;const bcs=new Set(ps.map(([,c])=>~~(c/3)));if(bcs.size===1){const bc2=[...bcs][0],br2=~~(row/3);for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++){const r=br2*3+dr,c=bc2*3+dc;if(r===row)continue;if(board[r][c]===0&&cands[r][c].has(n)){cands[r][c].delete(n);f=true;}}}}}for(let col=0;col<9;col++){for(let n=1;n<=9;n++){const ps=[];for(let r=0;r<9;r++)if(board[r][col]===0&&cands[r][col].has(n))ps.push([r,col]);if(ps.length<2)continue;const brs=new Set(ps.map(([r])=>~~(r/3)));if(brs.size===1){const br2=[...brs][0],bc2=~~(col/3);for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++){const r=br2*3+dr,c=bc2*3+dc;if(c===col)continue;if(board[r][c]===0&&cands[r][c].has(n)){cands[r][c].delete(n);f=true;}}}}}return f;}
  function xwing(){let f=false;for(let n=1;n<=9;n++){const rd=[];for(let r=0;r<9;r++){const cs=[];for(let c=0;c<9;c++)if(board[r][c]===0&&cands[r][c].has(n))cs.push(c);if(cs.length===2)rd.push({r,cs});}for(let i=0;i<rd.length;i++)for(let j=i+1;j<rd.length;j++){const a=rd[i],b2=rd[j];if(a.cs[0]===b2.cs[0]&&a.cs[1]===b2.cs[1])for(const col of a.cs)for(let r=0;r<9;r++){if(r===a.r||r===b2.r)continue;if(board[r][col]===0&&cands[r][col].has(n)){cands[r][col].delete(n);f=true;}}}const cd=[];for(let c=0;c<9;c++){const rs=[];for(let r=0;r<9;r++)if(board[r][c]===0&&cands[r][c].has(n))rs.push(r);if(rs.length===2)cd.push({c,rs});}for(let i=0;i<cd.length;i++)for(let j=i+1;j<cd.length;j++){const a=cd[i],b2=cd[j];if(a.rs[0]===b2.rs[0]&&a.rs[1]===b2.rs[1])for(const row of a.rs)for(let c=0;c<9;c++){if(c===a.c||c===b2.c)continue;if(board[row][c]===0&&cands[row][c].has(n)){cands[row][c].delete(n);f=true;}}}}return f;}
  function swordfish(){let f=false;for(let n=1;n<=9;n++){const rd=[];for(let r=0;r<9;r++){const cs=[];for(let c=0;c<9;c++)if(board[r][c]===0&&cands[r][c].has(n))cs.push(c);if(cs.length===2||cs.length===3)rd.push({r,cs});}for(let i=0;i<rd.length;i++)for(let j=i+1;j<rd.length;j++)for(let k=j+1;k<rd.length;k++){const cols=new Set([...rd[i].cs,...rd[j].cs,...rd[k].cs]);if(cols.size===3){const r3=[rd[i].r,rd[j].r,rd[k].r];for(const col of cols)for(let r=0;r<9;r++){if(r3.includes(r))continue;if(board[r][col]===0&&cands[r][col].has(n)){cands[r][col].delete(n);f=true;}}}}}return f;}

// SE-style puzzle rating: run solver tracking hardest technique used
function calcScore(secs,errors,hints,diff,mode){
  // Score builds up: each correctly filled cell earns points
  // Base per-cell value depends on difficulty
  const cellVal={beginner:10,easy:18,medium:35,hard:60,expert:90,master:130}[diff]||18;
  const mw=MODE_WEIGHT[mode]||1;
  // Time bonus: faster = more points per cell (up to 2x, min 0.5x)
  const expectedSecs={beginner:180,easy:300,medium:480,hard:720,expert:1080,master:1500}[diff]||300;
  const timeFactor=Math.max(0.5, Math.min(2.0, expectedSecs/Math.max(30,secs)));
  // Error and hint penalties reduce multiplier
  const errorFactor=Math.max(0.4, 1-errors*0.2);
  const hintFactor=Math.max(0.5, 1-hints*0.15);
  // Count correctly filled cells
  let filled=0;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(userBoard[r][c]!==0&&!givenCells.has(`${r},${c}`)&&userBoard[r][c]===solution[r][c])filled++;
  }
  return Math.round(filled*cellVal*mw*timeFactor*errorFactor*hintFactor);
}

  function swordfish2(){let f=false;for(let n=1;n<=9;n++){const rd=[];for(let r=0;r<9;r++){const cs=[];for(let c=0;c<9;c++)if(board[r][c]===0&&cands[r][c].has(n))cs.push(c);if(cs.length===2||cs.length===3)rd.push({r,cs});}for(let i=0;i<rd.length;i++)for(let j=i+1;j<rd.length;j++)for(let k=j+1;k<rd.length;k++){const cols=new Set([...rd[i].cs,...rd[j].cs,...rd[k].cs]);if(cols.size===3){const r3=[rd[i].r,rd[j].r,rd[k].r];for(const col of cols)for(let r=0;r<9;r++){if(r3.includes(r))continue;if(board[r][col]===0&&cands[r][col].has(n)){cands[r][col].delete(n);f=true;}}}}}if(f)mark(3.8);return f;}
  function xywing2(){let f=false;const biv=[];for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(board[r][c]===0&&cands[r][c].size===2)biv.push([r,c]);for(const[pr,pc]of biv){const[x,y]=[...cands[pr][pc]];const wX=biv.filter(([r,c])=>!(r===pr&&c===pc)&&sv(pr,pc,r,c)&&cands[r][c].has(x)&&!cands[r][c].has(y));const wY=biv.filter(([r,c])=>!(r===pr&&c===pc)&&sv(pr,pc,r,c)&&cands[r][c].has(y)&&!cands[r][c].has(x));for(const[r1,c1]of wX){const z1=[...cands[r1][c1]].find(n=>n!==x);for(const[r2,c2]of wY){const z2=[...cands[r2][c2]].find(n=>n!==y);if(z1!==z2)continue;for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(board[r][c]!==0||(r===r1&&c===c1)||(r===r2&&c===c2))continue;if(sv(r,c,r1,c1)&&sv(r,c,r2,c2)&&cands[r][c].has(z1)){cands[r][c].delete(z1);f=true;}}}}}if(f)mark(4.2);return f;}
  function wwing2(){let f=false;const biv=[];for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(board[r][c]===0&&cands[r][c].size===2)biv.push([r,c]);for(let i=0;i<biv.length;i++)for(let j=i+1;j<biv.length;j++){const[r1,c1]=biv[i],[r2,c2]=biv[j];const c1a=[...cands[r1][c1]],c2a=[...cands[r2][c2]];if(c1a[0]!==c2a[0]||c1a[1]!==c2a[1])continue;if(sv(r1,c1,r2,c2))continue;const[x,y]=[c1a[0],c1a[1]];for(const unit of units2){const xPl=unit.filter(([r,c])=>board[r][c]===0&&cands[r][c].has(x));if(xPl.length!==2)continue;const[pa,pb]=xPl;for(const[pa2,pb2]of[[pa,pb],[pb,pa]]){if(sv(pa2[0],pa2[1],r1,c1)&&sv(pb2[0],pb2[1],r2,c2)&&!(pa2[0]===r1&&pa2[1]===c1)&&!(pb2[0]===r2&&pb2[1]===c2)){for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(board[r][c]!==0||(r===r1&&c===c1)||(r===r2&&c===c2))continue;if(sv(r,c,r1,c1)&&sv(r,c,r2,c2)&&cands[r][c].has(y)){cands[r][c].delete(y);f=true;}}}}}}if(f)mark(4.3);return f;}
  function xyzwing2(){let f=false;const triv=[],biv2=[];for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(board[r][c]!==0)continue;if(cands[r][c].size===3)triv.push([r,c]);if(cands[r][c].size===2)biv2.push([r,c]);}for(const[pr,pc]of triv){const pcs=[...cands[pr][pc]];for(const[r1,c1]of biv2){if(!sv(pr,pc,r1,c1))continue;const w1=[...cands[r1][c1]];if(!w1.every(n=>pcs.includes(n)))continue;for(const[r2,c2]of biv2){if(r2===r1&&c2===c1)continue;if(!sv(pr,pc,r2,c2))continue;const w2=[...cands[r2][c2]];if(!w2.every(n=>pcs.includes(n)))continue;const m1=pcs.find(n=>!w1.includes(n)),m2=pcs.find(n=>!w2.includes(n));if(!m1||!m2||m1===m2)continue;const z=pcs.find(n=>n!==m1&&n!==m2);if(!z)continue;for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(board[r][c]!==0||(r===pr&&c===pc)||(r===r1&&c===c1)||(r===r2&&c===c2))continue;if(sv(r,c,pr,pc)&&sv(r,c,r1,c1)&&sv(r,c,r2,c2)&&cands[r][c].has(z)){cands[r][c].delete(z);f=true;}}}}}if(f)mark(4.4);return f;}
  function uniqueRect2(){let f=false;for(let r1=0;r1<9;r1++)for(let r2=r1+1;r2<9;r2++)for(let c1=0;c1<9;c1++)for(let c2=c1+1;c2<9;c2++){if(~~(r1/3)===~~(r2/3)&&~~(c1/3)===~~(c2/3))continue;const cells=[[r1,c1],[r1,c2],[r2,c1],[r2,c2]];const empty=cells.filter(([r,c])=>board[r][c]===0);if(empty.length<3)continue;if(empty.length===3){const ceil=cells.find(([r,c])=>!empty.some(([er,ec])=>er===r&&ec===c));if(!ceil||board[ceil[0]][ceil[1]]!==0)continue;const common2=empty.reduce((acc,[r,c])=>acc===null?[...cands[r][c]]:acc.filter(n=>cands[r][c].has(n)),null)||[];if(common2.length!==2)continue;common2.forEach(n=>{if(cands[ceil[0]][ceil[1]].has(n)){cands[ceil[0]][ceil[1]].delete(n);f=true;}});}}if(f)mark(4.5);return f;}
  function skyscraper2(){let f=false;for(let n=1;n<=9;n++){const rd=[];for(let r=0;r<9;r++){const cs=[];for(let c=0;c<9;c++)if(board[r][c]===0&&cands[r][c].has(n))cs.push(c);if(cs.length===2)rd.push({r,cs});}for(let i=0;i<rd.length;i++)for(let j=i+1;j<rd.length;j++){const a=rd[i],b=rd[j];for(const sh of[0,1]){if(a.cs[sh]===b.cs[sh]&&a.cs[1-sh]!==b.cs[1-sh]){const e1=[a.r,a.cs[1-sh]],e2=[b.r,b.cs[1-sh]];for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(board[r][c]!==0||(r===e1[0]&&c===e1[1])||(r===e2[0]&&c===e2[1]))continue;if(sv(r,c,e1[0],e1[1])&&sv(r,c,e2[0],e2[1])&&cands[r][c].has(n)){cands[r][c].delete(n);f=true;}}}}}const cd=[];for(let c=0;c<9;c++){const rs=[];for(let r=0;r<9;r++)if(board[r][c]===0&&cands[r][c].has(n))rs.push(r);if(rs.length===2)cd.push({c,rs});}for(let i=0;i<cd.length;i++)for(let j=i+1;j<cd.length;j++){const a=cd[i],b=cd[j];for(const sh of[0,1]){if(a.rs[sh]===b.rs[sh]&&a.rs[1-sh]!==b.rs[1-sh]){const e1=[a.rs[1-sh],a.c],e2=[b.rs[1-sh],b.c];for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(board[r][c]!==0||(r===e1[0]&&c===e1[1])||(r===e2[0]&&c===e2[1]))continue;if(sv(r,c,e1[0],e1[1])&&sv(r,c,e2[0],e2[1])&&cands[r][c].has(n)){cands[r][c].delete(n);f=true;}}}}}}if(f)mark(4.3);return f;}
  let progress=true;
  while(progress){
    progress=false;
    let placed=false;
    for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(board[r][c]!==0)continue;if(cands[r][c].size===1){pl(r,c,[...cands[r][c]][0]);mark(2.3);placed=true;progress=true;}}
    if(placed)continue;
    let hs=false;
    for(const unit of units2){for(let n=1;n<=9;n++){if(unit.some(([r,c])=>board[r][c]===n))continue;const p2=unit.filter(([r,c])=>board[r][c]===0&&cands[r][c].has(n));if(p2.length===1){pl(p2[0][0],p2[0][1],n);mark(1.5);hs=true;progress=true;}}}
    if(hs)continue;
    if(locked2()){progress=true;continue;}
    if(nakedSubset2(2,3.0)){progress=true;continue;}
    if(hiddenSubset2(2,3.4)){progress=true;continue;}
    if(nakedSubset2(3,3.6)){progress=true;continue;}
    if(xwing2()){progress=true;continue;}
    if(swordfish2()||hiddenSubset2(3,4.0)){progress=true;continue;}
    if(xywing2()||wwing2()){progress=true;continue;}
    if(xyzwing2()||uniqueRect2()||skyscraper2()){progress=true;continue;}
    break;
  }
  const unsolved=board.reduce((s,r)=>s+r.filter(v=>v===0).length,0);
  if(unsolved>0)return{score:maxSE||'?',label:'?'};
  return{score:maxSE,label:String(maxSE.toFixed(1))};
}

function countSolutions(b,limit){
  if(limit<=0)return 0;
  let count=0;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(b[r][c]!==0)continue;
    for(let n=1;n<=9;n++){
      if(!isValid(b,r,c,n))continue;
      b[r][c]=n;count+=countSolutions(b,limit-count);b[r][c]=0;
      if(count>=limit)return count;
    }
    return count; // dead end for first empty cell
  }
  return count+1; // all filled
}

function createPuzzle(sol,diff){
  // 6-level difficulty system:
  // beginner: level 1 (singles only), ~25 blanks
  // easy:     level 1, ~32 blanks
  // medium:   level 2 (pairs+locked), ~40 blanks, force 4 level-2 steps
  // hard:     level 3 (triples+xwing), ~48 blanks, force 4 level-3 steps
  // expert:   level 4 (swordfish+wings), ~54 blanks, force 4 level-4 steps
  // master:   level 4, maximize removals (~58+), force 6 level-4 steps
  const cfg={
    beginner:{maxLevel:5,target:28,forceLevel:0,forceCount:0},
    easy:    {maxLevel:5,target:36,forceLevel:0,forceCount:0},
    medium:  {maxLevel:5,target:44,forceLevel:0,forceCount:0},
    hard:    {maxLevel:5,target:50,forceLevel:0,forceCount:0},
    expert:  {maxLevel:5,target:55,forceLevel:0,forceCount:0},
    master:  {maxLevel:5,target:58,forceLevel:0,forceCount:0},
  }[diff]||{maxLevel:5,target:36,forceLevel:0,forceCount:0};

  // Difficulty is defined by blank count and solver level allowed.
  // For normal Sudoku, naked+hidden singles solve most puzzles up to ~57 blanks.
  // True "technique-required" puzzles need very specific configurations not achievable by
  // random blank placement. We use blank count + which cells are removed for difficulty.
  // Higher difficulties prioritize removing cells that create longer deduction chains.
  const puz=sol.map(r=>[...r]);
  let removed=0;
  // Shuffle positions: for harder levels, prefer removing cells from more constrained positions
  const positions=Array.from({length:81},(_,i)=>i);
  const shuffled=shuffle(positions);
  for(const pos of shuffled){
    if(removed>=cfg.target)break;
    const r=~~(pos/9),c=pos%9,bk=puz[r][c];puz[r][c]=0;
    if(logicSolveLevel(puz.map(row=>[...row]),cfg.maxLevel)!==null){removed++;}
    else{puz[r][c]=bk;}
  }
  // Uniqueness check
  if(countSolutions(puz.map(r=>[...r]),2)!==1){
    for(const pos of shuffle(positions)){
      const r=~~(pos/9),c=pos%9;if(puz[r][c]!==0)continue;
      puz[r][c]=sol[r][c];
      if(countSolutions(puz.map(r=>[...r]),2)===1)break;
      puz[r][c]=0;
    }
  }
  return puz;
}

/* KILLER CAGES */
function generateKillerCages(sol){const assigned=Array.from({length:9},()=>Array(9).fill(-1));const out=[];let idx=0;for(const[sr,sc]of shuffle(Array.from({length:81},(_,i)=>[~~(i/9),i%9]))){if(assigned[sr][sc]!==-1)continue;const max=2+~~(Math.random()*4);const cells=[[sr,sc]];assigned[sr][sc]=idx;const q=[[sr,sc]];while(q.length&&cells.length<max){const[r,c]=q.shift();for(const[nr,nc]of shuffle([[r-1,c],[r+1,c],[r,c-1],[r,c+1]])){if(nr>=0&&nr<9&&nc>=0&&nc<9&&assigned[nr][nc]===-1&&cells.length<max){assigned[nr][nc]=idx;cells.push([nr,nc]);q.push([nr,nc]);break;}}}out.push({cells,sum:cells.reduce((s,[r,c])=>s+sol[r][c],0)});idx++;}return out;}

/* RENDER */
function renderBoard(){
  const board=document.getElementById('sudoku-board');board.innerHTML='';givenCells.clear();hintCells.clear();
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const cell=document.createElement('div');cell.className='cell';cell.dataset.row=r;cell.dataset.col=c;
    if(puzzle[r][c]!==0)givenCells.add(`${r},${c}`);
    if(gameMode==='killer'){cell.classList.add('killer-cell');const key=`${r},${c}`;if(cellCageMap[key]!==undefined){const cage=cages[cellCageMap[key]];const sorted=[...cage.cells].sort((a,b)=>a[0]-b[0]||a[1]-b[1]);if(sorted[0][0]===r&&sorted[0][1]===c){const sl=document.createElement('div');sl.className='cage-sum';sl.textContent=cage.sum;cell.appendChild(sl);}}}
    cell.addEventListener('mousedown',e=>onCellMouseDown(e,r,c));
    cell.addEventListener('mouseenter',e=>onCellMouseEnter(e,r,c));
    board.appendChild(cell);
  }
  if(gameMode==='killer')drawCageOverlay();else document.getElementById('cage-overlay').innerHTML='';
  refreshAllCells();
}

function refreshAllCells(){for(let r=0;r<9;r++)for(let c=0;c<9;c++)refreshCellContent(r,c);applyHighlights();updateNumColUI();}

function refreshCellContent(r,c){
  const cell=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(!cell)return;
  const cageSum=cell.querySelector('.cage-sum');const isKiller=cell.classList.contains('killer-cell');const isGiven=givenCells.has(`${r},${c}`);
  cell.className='cell'+(isKiller?' killer-cell':'')+(isGiven?' given':'');cell.innerHTML='';if(cageSum)cell.appendChild(cageSum);
  const val=userBoard[r][c];
  if(val!==0){const isWrong=!isGiven&&!hintCells.has(`${r},${c}`)&&val!==solution[r][c];if(!isGiven){if(isWrong)cell.classList.add('num-conflict','user-err');else if(hintCells.has(`${r},${c}`))cell.classList.add('hint-cell');else cell.classList.add('user-ok');}cell.appendChild(document.createTextNode(val));}
  else{const notes=notesBoard[r][c];if(notes.size>0){const grid=document.createElement('div');grid.className='notes-grid';for(let n=1;n<=9;n++){const nd=document.createElement('div');const on=notes.has(n);nd.className='note-num'+(on?' on':'');if(on&&noteConflictsPlaced(userBoard,r,c,n))nd.classList.add('conflict-note');nd.textContent=on?n:'';const mark=noteColors[r][c][n];if(on&&mark){nd.style.background=mark;nd.style.color='#1a1408';nd.style.fontWeight='800';nd.style.textShadow='none';nd.style.borderRadius='3px';}grid.appendChild(nd);}cell.appendChild(grid);}}
}

/* HIGHLIGHTS */
function applyHighlights(){
  document.querySelectorAll('.cell').forEach(cell=>cell.classList.remove('hl-related','hl-same','hl-conflict','hl-selected','hl-bivalue'));
  document.querySelectorAll('.note-num.hl-match').forEach(nd=>nd.classList.remove('hl-match'));
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(userBoard[r][c]&&cellIsConflict(userBoard,r,c)){const cell=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(cell)cell.classList.add('hl-conflict');}}
  if(bivalueMode){for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(userBoard[r][c]!==0)continue;if(notesBoard[r][c].size===2){const cell=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(cell)cell.classList.add('hl-bivalue');}}}

  // Cell selection highlights
  if(selectedCell){
    const[sr,sc]=selectedCell;
    const selVal=userBoard[sr][sc]||puzzle[sr][sc]||0;
    document.querySelectorAll('.cell').forEach(cell=>{
      const r=+cell.dataset.row,c=+cell.dataset.col;
      if(r===sr&&c===sc){cell.classList.add('hl-selected');return;}
      const sameBox=~~(r/3)===~~(sr/3)&&~~(c/3)===~~(sc/3);
      const cellVal=userBoard[r][c]||puzzle[r][c]||0;
      if(selVal&&cellVal===selVal){cell.classList.add('hl-same');return;}
      if(r===sr||c===sc||sameBox)cell.classList.add('hl-related');
    });
  }

  // Active digit highlights — always applied when a digit is active
  const hlVal = activeColNum > 0 ? activeColNum :
    (selectedCell ? (userBoard[selectedCell[0]][selectedCell[1]]||puzzle[selectedCell[0]][selectedCell[1]]||0) : 0);

  if(hlVal){
    // Highlight cells containing this digit as hl-same (if not already selected/related)
    if(activeColNum>0 && !selectedCell){
      document.querySelectorAll('.cell').forEach(cell=>{
        const r=+cell.dataset.row,c=+cell.dataset.col;
        const cellVal=userBoard[r][c]||puzzle[r][c]||0;
        if(cellVal===hlVal) cell.classList.add('hl-same');
      });
    }
    // Highlight matching candidate notes
    document.querySelectorAll('.cell').forEach(cell=>{
      const r=+cell.dataset.row,c=+cell.dataset.col;
      if(notesBoard[r]&&notesBoard[r][c]&&notesBoard[r][c].has(hlVal)){
        const nn=cell.querySelectorAll('.note-num');
        if(nn[hlVal-1])nn[hlVal-1].classList.add('hl-match');
      }
    });
  }

  drawMultiOverlay();
}

function drawMultiOverlay(){
  const svg=document.getElementById('multi-overlay');svg.innerHTML='';if(multiSelected.size===0)return;
  const fillColor='rgba(184,122,255,0.18)',strokeColor='#b87aff';
  multiSelected.forEach(key=>{const[r,c]=key.split(',').map(Number);const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');rect.setAttribute('x',c*CS);rect.setAttribute('y',r*CS);rect.setAttribute('width',CS);rect.setAttribute('height',CS);rect.setAttribute('fill',fillColor);svg.appendChild(rect);});
  const drawn=new Set();
  multiSelected.forEach(key=>{const[r,c]=key.split(',').map(Number);[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{if(multiSelected.has(`${nr},${nc}`))return;const ek=`${Math.min(r,nr)},${Math.min(c,nc)},${r===nr?'h':'v'}`;if(drawn.has(ek))return;drawn.add(ek);const line=document.createElementNS('http://www.w3.org/2000/svg','line');if(r===nr){const x=nc>c?(c+1)*CS:c*CS;line.setAttribute('x1',x);line.setAttribute('y1',r*CS);line.setAttribute('x2',x);line.setAttribute('y2',(r+1)*CS);}else{const y=nr>r?(r+1)*CS:r*CS;line.setAttribute('x1',c*CS);line.setAttribute('y1',y);line.setAttribute('x2',(c+1)*CS);line.setAttribute('y2',y);}line.setAttribute('stroke',strokeColor);line.setAttribute('stroke-width','2.5');svg.appendChild(line);});});
}

/* CAGE OVERLAY */
function bRight(c){return c===2||c===5?3:1;}
function bBottom(r){return r===2||r===5?3:1;}
function drawCageOverlay(){
  const svg=document.getElementById('cage-overlay');svg.innerHTML='';
  const INS=3, cageColor='#9a7c48';
  function drawLine(x1,y1,x2,y2){
    if(x1===x2&&y1===y2)return;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',cageColor);l.setAttribute('stroke-width','1.5');
    l.setAttribute('stroke-dasharray','4 3');l.setAttribute('stroke-linecap','round');
    l.setAttribute('opacity','0.9');
    svg.appendChild(l);
  }
  const lL=c=>c*CS+INS,  lR=c=>(c+1)*CS-bRight(c)-INS;
  const lT=r=>r*CS+INS,  lB=r=>(r+1)*CS-bBottom(r)-INS;

  cages.forEach(cage=>{
    const cellSet=new Set(cage.cells.map(([r,c])=>`${r},${c}`));

    // Collect horizontal segments grouped by y-pixel, vertical by x-pixel
    const hSegs={}, vSegs={};
    cage.cells.forEach(([r,c])=>{
      if(!cellSet.has(`${r-1},${c}`)){const y=lT(r);(hSegs[y]=hSegs[y]||[]).push([lL(c),lR(c)]);}
      if(!cellSet.has(`${r+1},${c}`)){const y=lB(r);(hSegs[y]=hSegs[y]||[]).push([lL(c),lR(c)]);}
      if(!cellSet.has(`${r},${c-1}`)){const x=lL(c);(vSegs[x]=vSegs[x]||[]).push([lT(r),lB(r)]);}
      if(!cellSet.has(`${r},${c+1}`)){const x=lR(c);(vSegs[x]=vSegs[x]||[]).push([lT(r),lB(r)]);}
    });

    // Merge consecutive runs (gap <= 1px to bridge INS gaps between adjacent cells)
    function merge(arr){
      if(!arr.length)return[];
      arr.sort((a,b)=>a[0]-b[0]);
      const m=[[...arr[0]]];
      for(let i=1;i<arr.length;i++){
        const last=m[m.length-1];
        // Gap between segments: lR(c) to lL(c+1) = bRight(c)+2*INS — bridge it
        if(arr[i][0]<=last[1]+bRight(0)*2+INS*4)
          last[1]=Math.max(last[1],arr[i][1]);
        else m.push([...arr[i]]);
      }
      return m;
    }

    Object.entries(hSegs).forEach(([y,arr])=>merge(arr).forEach(([x1,x2])=>drawLine(x1,+y,x2,+y)));
    Object.entries(vSegs).forEach(([x,arr])=>merge(arr).forEach(([y1,y2])=>drawLine(+x,y1,+x,y2)));

    // Concave corner L-connectors
    // At grid corner (r,c): cells tl=(r-1,c-1), tr=(r-1,c), bl=(r,c-1), br=(r,c)
    // When exactly 3 in cage, the missing one creates an interior concave corner
    for(let r=0;r<=9;r++)for(let c=0;c<=9;c++){
      const tl=cellSet.has(`${r-1},${c-1}`);
      const tr=cellSet.has(`${r-1},${c}`);
      const bl=cellSet.has(`${r},${c-1}`);
      const br=cellSet.has(`${r},${c}`);
      if([tl,tr,bl,br].filter(Boolean).length!==3)continue;
      // !tl → corner ix=(lL(c), lT(r))
      if(!tl){ drawLine(lR(c-1),lT(r),lL(c),lT(r)); drawLine(lL(c),lB(r-1),lL(c),lT(r)); }
      // !tr → corner ix=(lR(c-1), lT(r))
      if(!tr){ drawLine(lL(c),lT(r),lR(c-1),lT(r)); drawLine(lR(c-1),lT(r),lR(c-1),lB(r-1)); }
      // !bl → corner ix=(lL(c), lB(r-1))
      if(!bl){ drawLine(lL(c),lB(r),lL(c),lB(r-1)); drawLine(lR(c-1),lB(r-1),lL(c),lB(r-1)); }
      // !br → corner ix=(lR(c-1), lB(r-1))
      if(!br){ drawLine(lR(c-1),lB(r),lR(c-1),lB(r-1)); drawLine(lL(c),lB(r-1),lR(c-1),lB(r-1)); }
    }
  });
}

/* CELL INTERACTION */
function onCellMouseDown(e,r,c){
  e.preventDefault();
  if(colorMarkMode){
    const cell=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(!cell)return;
    if(givenCells.has(`${r},${c}`)||userBoard[r][c]!==0)return;
    const rect=cell.getBoundingClientRect();
    const col3=Math.min(2,Math.floor((e.clientX-rect.left)/rect.width*3));
    const row3=Math.min(2,Math.floor((e.clientY-rect.top)/rect.height*3));
    const n=row3*3+col3+1;if(n<1||n>9)return;
    if(!notesBoard[r][c].has(n))return;
    if(noteColors[r][c][n]===currentMarkColor){delete noteColors[r][c][n];}else{noteColors[r][c][n]=currentMarkColor;}
    refreshCellContent(r,c);applyHighlights();return;
  }
  // Paint mode: activeColNum is set — fill cells on drag, skip multi-select logic
  if(activeColNum>0){
    isDragging=true;
    selectCell(r,c);
    return;
  }
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}longPressOrigin=null;
  if(ctrlHeld){if(selectedCell&&multiSelected.size===0){multiSelected.add(`${selectedCell[0]},${selectedCell[1]}`);selectedCell=null;}startMultiDrag(r,c,true);}
  else{selectCell(r,c);longPressOrigin=[r,c];longPressTimer=setTimeout(()=>{longPressTimer=null;},LONG_PRESS_MS);}
}
function startMultiDrag(r,c,additive){isDragging=true;const key=`${r},${c}`;if(additive&&multiSelected.size>0){if(multiSelected.has(key))multiSelected.delete(key);else multiSelected.add(key);}else{multiSelected.clear();multiSelected.add(key);}selectedCell=null;applyHighlights();}
function onCellMouseEnter(e,r,c){
  // Paint mode: fill each cell dragged over
  if(activeColNum>0&&isDragging){selectCell(r,c);return;}
  if(ctrlHeld&&isDragging){multiSelected.add(`${r},${c}`);selectedCell=null;applyHighlights();return;}
  if(longPressOrigin&&(r!==longPressOrigin[0]||c!==longPressOrigin[1])){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}if(!isDragging){isDragging=true;multiSelected.clear();multiSelected.add(`${longPressOrigin[0]},${longPressOrigin[1]}`);selectedCell=null;}multiSelected.add(`${r},${c}`);applyHighlights();}
}
document.addEventListener('mouseup',()=>{isDragging=false;longPressOrigin=null;if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}});
function selectCell(r,c){
  if(activeColNum>0){
    // Digit mode: clicking a cell fills it (or toggles note) without deactivating digit mode
    selectedCell=[r,c];
    multiSelected.clear();
    applyHighlights();
    inputNum(activeColNum);
    // After filling, stay in digit mode (selectedCell cleared by inputNum's refreshAllCells)
    selectedCell=null;
    applyHighlights();
  } else {
    selectedCell=[r,c];
    multiSelected.clear();
    applyHighlights();
  }
}

/* UNDO */
function pushUndo(){
  undoStack.push({
    userBoard:userBoard.map(r=>[...r]),
    notesBoard:notesBoard.map(r=>r.map(s=>new Set(s))),
    noteColors:noteColors.map(r=>r.map(o=>({...o}))),
    hintCells:new Set(hintCells),
    errorCount,
  });
  if(undoStack.length>50)undoStack.shift();
}
function undoLast(){
  if(gameWon||undoStack.length===0)return;
  const s=undoStack.pop();
  userBoard=s.userBoard;
  notesBoard=s.notesBoard;
  noteColors=s.noteColors;
  hintCells=s.hintCells;
  // errorCount intentionally NOT restored — mistakes are permanent
  refreshAllCells();applyHighlights();updateStats();
}

/* INPUT */
function inputNum(n){
  if(gameWon)return;
  if(multiSelected.size>0&&n!==0){
    pushUndo();
    let allHave=true;multiSelected.forEach(key=>{const[r,c]=key.split(',').map(Number);if(!givenCells.has(key)&&userBoard[r][c]===0&&!notesBoard[r][c].has(n))allHave=false;});multiSelected.forEach(key=>{const[r,c]=key.split(',').map(Number);if(givenCells.has(key)||userBoard[r][c]!==0)return;if(allHave)notesBoard[r][c].delete(n);else notesBoard[r][c].add(n);refreshCellContent(r,c);});applyHighlights();return;
  }
  if(!selectedCell)return;const[r,c]=selectedCell;if(givenCells.has(`${r},${c}`))return;
  if(notesMode&&n!==0){if(userBoard[r][c]!==0)return;pushUndo();const notes=notesBoard[r][c];if(notes.has(n))notes.delete(n);else notes.add(n);refreshCellContent(r,c);applyHighlights();return;}
  if(n===0){
    if(userBoard[r][c]===0&&notesBoard[r][c].size===0)return; // nothing to clear
    pushUndo();
    userBoard[r][c]=0;notesBoard[r][c].clear();noteColors[r][c]={};hintCells.delete(`${r},${c}`);
    refreshAllCells();applyHighlights();return;
  }
  pushUndo();
  const prevVal=userBoard[r][c];
  notesBoard[r][c].clear();noteColors[r][c]={};userBoard[r][c]=n;hintCells.delete(`${r},${c}`);
  for(let i=0;i<9;i++){notesBoard[r][i].delete(n);notesBoard[i][c].delete(n);}
  const br=~~(r/3)*3,bc=~~(c/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)notesBoard[br+dr][bc+dc].delete(n);
  if(n!==solution[r][c]&&prevVal!==n){errorCount++;updateHearts();updateStats();const cell=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(cell){cell.classList.add('anim-shake');setTimeout(()=>cell.classList.remove('anim-shake'),350);}if(errorCount>=3){gameWon=true;stopTimer();refreshAllCells();applyHighlights();setTimeout(()=>document.getElementById('lose-overlay').classList.add('show'),400);return;}}
  refreshAllCells();applyHighlights();updateStats();checkWin();
}

function fillAllCandidates(){for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(userBoard[r][c]!==0)continue;notesBoard[r][c]=getCandidates(userBoard,r,c);}refreshAllCells();applyHighlights();}

function giveHint(){if(gameWon)return;let anyFilled=false,progress=true;while(progress){progress=false;for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(userBoard[r][c]!==0)continue;const ca=getCandidates(userBoard,r,c);if(ca.size===1){const val=[...ca][0];userBoard[r][c]=val;notesBoard[r][c].clear();hintCells.add(`${r},${c}`);for(let i=0;i<9;i++){notesBoard[r][i].delete(val);notesBoard[i][c].delete(val);}const br2=~~(r/3)*3,bc2=~~(c/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)notesBoard[br2+dr][bc2+dc].delete(val);hintCount++;progress=true;anyFilled=true;}}}if(!anyFilled)return;refreshAllCells();applyHighlights();updateStats();document.querySelectorAll('.cell.hint-cell').forEach((cell,i)=>{setTimeout(()=>{cell.classList.add('anim-hint');setTimeout(()=>cell.classList.remove('anim-hint'),450);},i*6);});checkWin();}

function useCellHint(){
  if(gameWon||cellHintsLeft<=0)return;
  if(!selectedCell)return;
  const[r,c]=selectedCell;
  if(givenCells.has(`${r},${c}`))return;
  if(userBoard[r][c]===solution[r][c])return; // already correct
  cellHintsLeft--;
  updateCellHintBtn();
  userBoard[r][c]=solution[r][c];
  notesBoard[r][c].clear();hintCells.add(`${r},${c}`);
  // Remove val from notes in row/col/box
  const val=solution[r][c];
  for(let i=0;i<9;i++){notesBoard[r][i].delete(val);notesBoard[i][c].delete(val);}
  const br=~~(r/3)*3,bc=~~(c/3)*3;for(let dr=0;dr<3;dr++)for(let dc=0;dc<3;dc++)notesBoard[br+dr][bc+dc].delete(val);
  hintCount++;
  const cell=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
  refreshAllCells();applyHighlights();updateStats();
  if(cell){cell.classList.add('anim-hint');setTimeout(()=>cell.classList.remove('anim-hint'),450);}
  checkWin();
}
function updateCellHintBtn(){
  const btn=document.getElementById('cell-hint-btn');
  const lbl=document.getElementById('cell-hint-left');
  const used=3-cellHintsLeft;
  if(lbl)lbl.textContent=`${used}/3`;
  if(btn){btn.disabled=cellHintsLeft<=0;btn.style.opacity='';}
}
function resetBoard(){
  userBoard=puzzle.map(r=>[...r]);notesBoard=Array.from({length:9},()=>Array.from({length:9},()=>new Set()));
  errorCount=0;hintCount=0;hintCells.clear();selectedCell=null;multiSelected.clear();
  noteColors=Array.from({length:9},()=>Array.from({length:9},()=>({})));
  cellHintsLeft=3;updateCellHintBtn();undoStack=[];
  updateHearts();updateStats();updateNumColUI();gameWon=false;resetTimer();startTimer();renderBoard();
}

function checkWin(){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(userBoard[r][c]!==solution[r][c])return;
  if(gameMode==='killer')for(const cage of cages)if(cage.cells.reduce((s,[r,c])=>s+userBoard[r][c],0)!==cage.sum)return;
  gameWon=true;stopTimer();let filled=0;for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(userBoard[r][c]!==0&&!givenCells.has(`${r},${c}`))filled++;
  const score=calcScore(secondsElapsed,errorCount,hintCount,difficulty,gameMode);recordWin(score);
  document.getElementById('win-message').textContent=`难度: ${{beginner:'入门',easy:'简单',medium:'中等',hard:'困难',expert:'专家',master:'大师'}[difficulty]} · 用时: ${fmtTime(secondsElapsed)} · 错误: ${errorCount} · 得分: ${score}`;
  document.getElementById('win-overlay').classList.add('show');
}

function revealBoard(){for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(!givenCells.has(`${r},${c}`)){userBoard[r][c]=solution[r][c];notesBoard[r][c].clear();hintCells.add(`${r},${c}`);}}refreshAllCells();applyHighlights();}

/* PUZZLE RATING — simulate solve, accumulate technique weights */


function newGame(){
  gameWon=false;selectedCell=null;multiSelected.clear();
  // Use pre-verified puzzle bank for normal mode (guaranteed correct difficulty level)
  if(gameMode!=='killer'&&PUZZLE_BANK[difficulty]&&PUZZLE_BANK[difficulty].length>0){
    const bank=PUZZLE_BANK[difficulty];
    const entry=bank[~~(Math.random()*bank.length)];
    solution=entry[1].split('').map((_,i)=>entry[1].slice(~~(i/9)*9,~~(i/9)*9+9).split('').map(Number)).filter((_,i)=>i%9===0);
    // Parse solution grid
    solution=[];for(let r=0;r<9;r++){const row=[];for(let c=0;c<9;c++)row.push(+entry[1][r*9+c]);solution.push(row);}
    puzzle=[];for(let r=0;r<9;r++){const row=[];for(let c=0;c<9;c++)row.push(+entry[0][r*9+c]);puzzle.push(row);}
  } else {
    solution=generateSolution();puzzle=createPuzzle(solution,difficulty);
  }
  userBoard=puzzle.map(r=>[...r]);notesBoard=Array.from({length:9},()=>Array.from({length:9},()=>new Set()));
  cages=[];cellCageMap={};hintCells.clear();errorCount=0;hintCount=0;activeColNum=0;
  cellHintsLeft=3;updateCellHintBtn();undoStack=[];
  bivalueMode=false;document.getElementById('nc-bivalue').classList.remove('active');
  noteColors=Array.from({length:9},()=>Array.from({length:9},()=>({})));
  if(colorMarkMode){colorMarkMode=false;document.getElementById('nc-color').classList.remove('active');document.getElementById('color-strip').style.display='none';}
  if(gameMode==='killer'){cages=generateKillerCages(solution);cages.forEach((cage,idx)=>cage.cells.forEach(([r,c])=>{cellCageMap[`${r},${c}`]=idx;}));const kg={beginner:22,easy:15,medium:10,hard:5,expert:2,master:1}[difficulty]||15;const keep=new Set(shuffle(Array.from({length:81},(_,i)=>[~~(i/9),i%9])).slice(0,kg).map(([r,c])=>`${r},${c}`));for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(!keep.has(`${r},${c}`))puzzle[r][c]=0;userBoard=puzzle.map(r=>[...r]);}
  resetTimer();startTimer();renderBoard();updateHearts();updateStats();updateNumColUI();updateModeLabel();refreshHistory();
}

/* UI */
function setMode(m){if(gameMode===m)return;gameMode=m;document.querySelectorAll('.mode-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='normal')||(i===1&&m==='killer')));newGame();}
function setDiff(d){if(difficulty===d)return;difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.diff===d));newGame();}
function updateModeLabel(){
  const el=document.getElementById('puzzle-rating');
  const sep=document.getElementById('rating-sep');
  if(!el)return;
  if(gameMode==='killer'){el.textContent='';if(sep)sep.style.display='none';return;}
  el.textContent='…';el.style.color='var(--text3)';
  if(sep)sep.style.display='';
  setTimeout(()=>{
    const r=ratePuzzle(puzzle.map(row=>[...row]));
    const s=r.score;
    if(s==='?'||isNaN(s)){el.textContent='?';el.style.color='var(--text3)';return;}
    // SE scale: 1.5=easy, 2.3-2.8=medium, 3.0-4.0=hard, 4.2-4.5=expert/master
    const color=s<2.3?'#7ec8a0':s<3.0?'#88c8e8':s<3.8?'var(--accent2)':s<4.2?'#e8a040':s<4.4?'var(--red)':'var(--purple)';
    el.textContent=s.toFixed(1);
    el.style.color=color;
  },20);
}
function closeOverlay(){document.getElementById('win-overlay').classList.remove('show');document.getElementById('lose-overlay').classList.remove('show');}
function numColClick(n){
  if(n===0){
    // Erase: clear activeColNum, if cell selected clear it
    activeColNum=0;updateNumColUI();
    if(selectedCell||multiSelected.size>0){inputNum(0);}
    else{applyHighlights();}
    return;
  }
  if(activeColNum===n){
    // Deactivate digit mode
    activeColNum=0;selectedCell=null;multiSelected.clear();
    updateNumColUI();applyHighlights();return;
  }
  // Activate digit mode — clear any cell selection, just show digit highlights
  activeColNum=n;
  selectedCell=null;multiSelected.clear();
  updateNumColUI();applyHighlights();
}
function toggleNotes(){notesMode=!notesMode;document.getElementById('notes-label').style.opacity=notesMode?'1':'0';document.getElementById('nc-notes').classList.toggle('active',notesMode);document.querySelector('.board-wrapper').classList.toggle('notes-active',notesMode);updateNumColUI();}
function toggleBivalue(){bivalueMode=!bivalueMode;document.getElementById('nc-bivalue').classList.toggle('active',bivalueMode);applyHighlights();}

/* COLOR MARK */
function initColorPicker(){
  const container=document.getElementById('cs-swatches');if(!container)return;
  COLOR_PRESETS.forEach(col=>{const sw=document.createElement('div');sw.style.cssText=`width:20px;height:20px;border-radius:4px;background:${col};cursor:pointer;border:2px solid ${col===currentMarkColor?'white':'transparent'};flex-shrink:0;`;sw.onclick=e=>{e.stopPropagation();selectMarkColor(col);};container.appendChild(sw);});
  const inp=document.getElementById('cs-custom');const preview=document.getElementById('cs-custom-preview');
  if(inp){inp.addEventListener('input',e=>{selectMarkColor(e.target.value);preview.style.background=e.target.value;});}
}
function selectMarkColor(col){currentMarkColor=col;document.querySelectorAll('#cs-swatches div').forEach((sw,i)=>{sw.style.borderColor=COLOR_PRESETS[i]===col?'white':'transparent';});}
function toggleColorMark(){
  colorMarkMode=!colorMarkMode;document.getElementById('nc-color').classList.toggle('active',colorMarkMode);
  const strip=document.getElementById('color-strip');
  if(colorMarkMode){strip.style.display='block';requestAnimationFrame(()=>{const btn=document.getElementById('nc-color');const rect=btn.getBoundingClientRect();const w=strip.offsetWidth||120,h=strip.offsetHeight||80;strip.style.left=Math.max(4,rect.left-w-8)+'px';strip.style.top=Math.min(rect.top,window.innerHeight-h-8)+'px';});}
  else strip.style.display='none';
}
function clearAllNoteColors(){noteColors=Array.from({length:9},()=>Array.from({length:9},()=>({})));refreshAllCells();}

/* KEYBOARD */
document.addEventListener('keydown',e=>{
  if(e.key==='Control'){ctrlHeld=true;return;}
  if((e.key==='z'||e.key==='Z')&&ctrlHeld){e.preventDefault();undoLast();return;}
  if(e.key==='n'||e.key==='N'){toggleNotes();return;}
  if(e.code&&e.code.startsWith('Numpad')&&e.key>='1'&&e.key<='9'){const prev=notesMode;notesMode=true;inputNum(+e.key);notesMode=prev;return;}
  if(e.code==='Numpad0'||e.code==='NumpadDecimal'){inputNum(0);return;}
  if(e.key>='1'&&e.key<='9'){inputNum(+e.key);return;}
  if(e.key==='0'||e.key==='Backspace'||e.key==='Delete'){inputNum(0);return;}
  if(!selectedCell)return;const[r,c]=selectedCell;let nr=r,nc=c;
  if(e.key==='ArrowUp'){nr--;e.preventDefault();}else if(e.key==='ArrowDown'){nr++;e.preventDefault();}else if(e.key==='ArrowLeft'){nc--;e.preventDefault();}else if(e.key==='ArrowRight'){nc++;e.preventDefault();}else return;
  if(nr>=0&&nr<9&&nc>=0&&nc<9)selectCell(nr,nc);
});
document.addEventListener('keyup',e=>{if(e.key==='Control'){ctrlHeld=false;isDragging=false;}});

initColorPicker();
newGame();
</script>
