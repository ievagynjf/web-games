<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的游戏大厅</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        /* 标签栏样式 */
        .tab-bar { background: #333; display: flex; padding: 10px 10px 0 10px; }
        .tab-btn { 
            padding: 10px 20px; cursor: pointer; background: #555; color: white;
            border: none; border-radius: 8px 8px 0 0; margin-right: 5px; transition: 0.3s;
        }
        .tab-btn:hover { background: #777; }
        .tab-btn.active { background: #eee; color: #333; font-weight: bold; }

        /* 游戏容器（窗口） */
        #game-frame { 
            flex-grow: 1; /* 自动填满剩余高度 */
            border: none; width: 100%; background: white;
        }
    </style>
</head>
<body>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchGame('sudoku/index.html', this)">经典数独</button>
        
        <button class="tab-btn" onclick="switchGame('minesweeper/index.html', this)">扫雷</button>
        
        <button class="tab-btn" onclick="switchGame('https://example.com/game', this)">外部游戏</button>
    </div>
    
    <iframe id="game-frame" src="sudoku/index.html"></iframe>

    <script>
        function switchGame(url, element) {
            // 1. 切换 iframe 的地址
            document.getElementById('game-frame').src = url;

            // 2. 切换标签页的高亮状态
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
